name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy src vv

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install ".[dev,mcp,tools]"
      - run: pip install "pip-audit==2.10.1"
      - run: pip-audit

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,mcp]"
      - run: pytest -q -m "not toolchain"

  test-toolchains:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          package-manager-cache: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.24.x"
          cache: false
      - run: sudo apt-get update
      - run: sudo apt-get install --yes shellcheck
      - run: pip install -e ".[dev,mcp,tools]"
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify required toolchains
        run: |
          node --version
          go version
          cargo --version
          shellcheck --version
          gitleaks version
          semgrep --version
          bandit --version
          ruff --version
      - run: REPOMEDIC_VV_STRICT=1 pytest -q

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,mcp]"
      - run: pytest -q -m "not toolchain" --cov=repomedic --cov-report=term-missing --cov-fail-under=75

  corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          package-manager-cache: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.24.x"
          cache: false
      - run: sudo apt-get update
      - run: sudo apt-get install --yes shellcheck
      - run: pip install -e ".[dev,tools]"
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run corpus tests
        id: corpus-tests
        continue-on-error: true
        run: REPOMEDIC_VV_STRICT=1 pytest -q -m corpus
      - name: Score corpus
        id: corpus-scorer
        continue-on-error: true
        run: REPOMEDIC_VV_STRICT=1 python -m vv.scorer > vv-results.txt
      - run: cat vv-results.txt
        if: always()
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: repomedic-vv-results
          path: vv-results.txt
          retention-days: 14
          if-no-files-found: error
      - name: Enforce corpus gates
        if: always()
        env:
          CORPUS_TEST_OUTCOME: ${{ steps.corpus-tests.outcome }}
          CORPUS_SCORER_OUTCOME: ${{ steps.corpus-scorer.outcome }}
        run: |
          test "$CORPUS_TEST_OUTCOME" = "success"
          test "$CORPUS_SCORER_OUTCOME" = "success"

  dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip wheel . --wheel-dir "$RUNNER_TEMP/wheelhouse"
      - name: Verify the wheel excludes the V&V harness
        run: >-
          python -c 'import sys, zipfile; assert len(sys.argv) == 2;
          names = zipfile.ZipFile(sys.argv[1]).namelist();
          assert not any(name == "vv" or name.startswith("vv/") for name in names)'
          "$RUNNER_TEMP"/wheelhouse/repomedic-*.whl
      - run: pip install --force-reinstall "$RUNNER_TEMP"/wheelhouse/repomedic-*.whl
      - run: repomedic selfcheck -o json > "$RUNNER_TEMP/selfcheck.json"
      - run: python -c 'import json, sys; assert json.load(open(sys.argv[1]))["healthy"]' "$RUNNER_TEMP/selfcheck.json"
      - run: repomedic scan . --no-exec --fail-on error -o json > "$RUNNER_TEMP/dogfood.json"

  vscode-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm audit --audit-level=high

  action-selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run the bundled action against a known-broken fixture
        id: scan
        uses: ./
        continue-on-error: true
        with:
          path: tests/fixtures/broken_imports
          upload-sarif: "false"
      - name: Assert exit 1 and valid SARIF
        run: |
          test "${{ steps.scan.outputs.exit-code }}" = "1"
          python - <<'EOF'
          import json
          with open("repomedic.sarif") as file:
              sarif = json.load(file)
          assert sarif["version"] == "2.1.0", sarif.get("version")
          run = sarif["runs"][0]
          assert run["tool"]["driver"]["name"] == "RepoMedic"
          assert run["results"], "expected findings for the broken fixture"
          print(f"SARIF OK: {len(run['results'])} results")
          EOF
